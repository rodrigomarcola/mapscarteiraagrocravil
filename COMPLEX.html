        function calcularAreaPlanometrica(coords) {
            let area = 0;
            const R = 6378137;
            if (coords.length > 2) {
                for (let i = 0; i < coords.length - 1; i++) {
                    let p1 = coords[i];
                    let p2 = coords[i + 1];
                    let lat1 = p1.lat * Math.PI / 180;
                    let lat2 = p2.lat * Math.PI / 180;
                    let lon1 = p1.lng * Math.PI / 180;
                    let lon2 = p2.lng * Math.PI / 180;
                    area += (lon2 - lon1) * (2 + Math.sin(lat1) + Math.sin(lat2));
                }
                area = area * R * R / 2;
            }
            return Math.abs(area);
        }

        function atualizarRotuloDeArea(camadaPoligono) {
            const pontosAtuais = camadaPoligono.getLatLngs()[0];
            const pontosFechados = [...pontosAtuais, pontosAtuais[0]];
            
            const areaMetros = calcularAreaPlanometrica(pontosFechados);
            const areaHectares = areaMetros / 10000;

            const textoArea = areaHectares.toFixed(2) + " ha (" + areaMetros.toLocaleString('pt-BR', {maximumFractionDigits: 0}) + " m²)";
            
            document.getElementById('area-label').textContent = "Área: " + textoArea;
            camadaPoligono.setPopupContent("<b>Área Principal</b><br>60 - 2026 - RODRIGO MARCOLA<br><b>Medida:</b> " + textoArea);
        }

                var p2 = next.latlng;

                    if (marcadorSelecionado) {
                        map.setView(marcadorSelecionado.getLatLng(), 17);
                        marcadorSelecionado.openPopup();
    if (myPolygon.editor) {
        myPolygon.editor.reset();
alert("Aviso 283");
    }
                    }
                }
            });
        });

        document.querySelectorAll('.layer-toggle').forEach(checkbox => {
            checkbox.addEventListener('change', function(e) {
                e.stopPropagation();

                const type = this.getAttribute('data-type');
                const isChecked = this.checked;

                if (type === "polygon") {
                    if (isChecked) { 
                        myPolygon.addTo(map); 
                        myPolygon.enableEdit();
                    } else { 
                        myPolygon.disableEdit(); 
                        map.removeLayer(myPolygon); 
                    }
                } else if (type === "marker") {
                    const id = this.closest('.list-item').getAttribute('data-id');
                    const marcadorSelecionado = meusMarcadores[id];
                    if (marcadorSelecionado) {
                        if (isChecked) { marcadorSelecionado.addTo(map); } else { map.removeLayer(marcadorSelecionado); }
                    }
                }
            });

            checkbox.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });

        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-btn');

        toggleBtn.addEventListener('click', () => {
            if (sidebar.style.display === 'none') {
                sidebar.style.display = 'block';
                toggleBtn.textContent = '☰ Ocultar Lista';
                toggleBtn.style.left = '320px';
            } else {
                sidebar.style.display = 'none';
                toggleBtn.textContent = '☰ Mostrar Lista';
                toggleBtn.style.left = '20px';
            }
            setTimeout(() => map.invalidateSize(), 300);
        });
    </script>
</body>
