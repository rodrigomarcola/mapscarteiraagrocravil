<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização KML</title>

    <!-- Importações do Leaflet posicionadas corretamente no cabeçalho -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    
    <style>
        html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
        #container { display: flex; height: 100vh; width: 100vw; }
        
        #sidebar { 
            width: 280px; 
            background: #f8f9fa; 
            padding: 10px; 
            overflow-y: auto; 
            border-right: 1px solid #ddd;
            z-index: 1000;
        }
        
        #map { flex: 1; height: 100%; min-width: 300px; }
        
        #toggle-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1001;
            background: white;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-size: 15px;
        }

        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            margin: 8px 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }
        .list-item:hover { background: #e3f2fd; border-color: #2196F3; }
        .list-item input[type="checkbox"] { cursor: pointer; margin-top: 4px; }
        .item-text { flex: 1; }
    </style>
</head>
<body>
    <button id="toggle-btn">☰ Ocultar Lista</button>
    
    <div id="container">
        <!-- Sidebar -->
        <div id="sidebar">
            <h3 style="margin-top: 45px;">Elementos</h3>
            
            <div class="list-item" data-type="polygon" data-id="area_principal">
                <input type="checkbox" class="layer-toggle" data-type="polygon" data-id="area_principal" checked>
                <div class="item-text">
                    📍 Área Principal<br>
                    <small>60 - 2026 - RODRIGO MARCOLA</small>
                </div>
            </div>
            
            <div class="list-item" data-type="marker" data-id="ponto1">
                <input type="checkbox" class="layer-toggle" data-type="marker" data-id="ponto1" checked>
                <div class="item-text">
                    📍 Ponto Principal<br>
                    <small>111644 - RODRIGO MARCOLA</small>
                </div>
            </div>

            <div class="list-item" data-type="marker" data-id="ponto2">
                <input type="checkbox" class="layer-toggle" data-type="marker" data-id="ponto2" checked>
                <div class="item-text">
                    📍 Segundo Ponto<br>
                    <small>Acompanhamento Técnico</small>
                </div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        // Inicializa o mapa focado de forma ampla nas coordenadas
        const map = L.map('map').setView([-27.20, -49.61], 12);

        // URL alterada para o OpenStreetMap padrão para garantir que o mapa carregue em qualquer rede
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const polygonCoords = [
            [-27.203164, -49.6176671], [-27.2034717, -49.6176805],
            [-27.2035099, -49.6187856], [-27.203987, -49.6190699],
            [-27.2043257, -49.6191075], [-27.2044641, -49.6190645],
            [-27.2048124, -49.6189036], [-27.205008, -49.6185978],
            [-27.2050271, -49.6173908], [-27.2060146, -49.6172889],
            [-27.2059908, -49.6154114], [-27.2065061, -49.6151753],
            [-27.2065061, -49.6141937], [-27.206029, -49.6139415],
            [-27.2040251, -49.6145155], [-27.2033763, -49.615237],
            [-27.2031425, -49.6152451], [-27.203164, -49.6176671]
        ];

        // Coleção estruturada de camadas geométricas
        const meusPoligonos = {
            "area_principal": L.polygon(polygonCoords, {
                color: '#FF5252', weight: 3, fillOpacity: 0.35
            }).bindPopup("<b>Área Principal</b><br>60 - 2026 - RODRIGO MARCOLA")
        };
        meusPoligonos["area_principal"].addTo(map);

        const meusMarcadores = {
            "ponto1": L.marker([-27.1876285, -49.6066494]).bindPopup("<b>Ponto Principal</b><br>111644 - RODRIGO MARCOLA"),
            "ponto2": L.marker([-27.547539929, -50.025449027]).bindPopup("<b>Segundo Ponto</b><br>Acompanhamento Técnico")
        };

        for (let chave in meusMarcadores) {
            meusMarcadores[chave].addTo(map);
        }

        // 1. Ação ao clicar no texto do item da lista
        document.querySelectorAll('.list-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const type = this.getAttribute('data-type');
                const id = this.getAttribute('data-id');
                const checkbox = this.querySelector('.layer-toggle');

                // Se o checkbox estiver desligado, não dispara o zoom
                if (!checkbox.checked) return;
                
                if (type === "polygon") {
                    const poli = meusPoligonos[id];
                    if (poli) {
                        map.fitBounds(poli.getBounds()); 
                        poli.openPopup();
                    }
                } else if (type === "marker") {
                    const marcadorSelecionado = meusMarcadores[id];
                    if (marcadorSelecionado) {
                        map.setView(marcadorSelecionado.getLatLng(), 16);
                        marcadorSelecionado.openPopup();
                    }
                }
            });
        });

        // 2. Ação ao interagir com o Checkbox
        document.querySelectorAll('.layer-toggle').forEach(checkbox => {
            checkbox.addEventListener('change', function(e) {
                e.stopPropagation(); // Impede o clique de subir para a div pai

                const type = this.getAttribute('data-type');
                const id = this.getAttribute('data-id');
                const isChecked = this.checked;

                if (type === "polygon") {
                    const poli = meusPoligonos[id];
                    if (poli) {
                        if (isChecked) { poli.addTo(map); } else { map.removeLayer(poli); }
                    }
                } else if (type === "marker") {
                    const marcadorSelecionado = meusMarcadores[id];
                    if (marcadorSelecionado) {
                        if (isChecked) { marcadorSelecionado.addTo(map); } else { map.removeLayer(marcadorSelecionado); }
                    }
                }
            });

            // Proteção extra contra cliques na caixinha
            checkbox.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });

        // Controle do botão Ocultar/Mostrar Lista
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-btn');

        toggleBtn.addEventListener('click', () => {
            if (sidebar.style.display === 'none') {
                sidebar.style.display = 'block';
                toggleBtn.textContent = '☰ Ocultar Lista';
            } else {
                sidebar.style.display = 'none';
                toggleBtn.textContent = '☰ Mostrar Lista';
            }
            setTimeout(() => map.invalidateSize(), 100);
        });
    </script>
</body>
</html>
